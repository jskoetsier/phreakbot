version: '3.8'

services:
  postgres:
    image: docker.io/postgres:14-alpine
    container_name: phreakbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-phreakbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-phreakbot}
      POSTGRES_DB: ${POSTGRES_DB:-phreakbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data:Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phreakbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - phreakbot-network

  phreakbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phreakbot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config:/app/config:Z
      - ./modules:/app/modules:Z
      - ./extra_modules:/app/extra_modules:Z
      - ./logs:/app/logs:Z
      - ./scripts:/app/scripts:Z
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-phreakbot}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-phreakbot}
      DB_NAME: ${POSTGRES_DB:-phreakbot}
      IRC_SERVER: ${IRC_SERVER:-irc.libera.chat}
      IRC_PORT: ${IRC_PORT:-6667}
      IRC_NICKNAME: ${IRC_NICKNAME:-PhreakBot}
      IRC_CHANNEL: ${IRC_CHANNEL:-#phreakbot}
      REMOTE_SSH_COMMAND: ${REMOTE_SSH_COMMAND:-}
      REMOTE_DIRECTORY: ${REMOTE_DIRECTORY:-/opt/phreakbot}
      BOT_VERSION: ${BOT_VERSION:-standard}
    command: /app/scripts/startup.sh
    networks:
      - phreakbot-network

volumes:
  postgres_data:
    driver: local

networks:
  phreakbot-network:
    driver: bridge
